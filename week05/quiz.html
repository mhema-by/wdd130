<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <div class="quiz-container">

        <h1>☑️ Basic HTML and CSS Quiz</h1>

        <form>

            <label>1. What does the acronym CSS stand for?</label>
            <input type="text">

            <label>2. How are id and class attributes selected in CSS?</label>
            <textarea rows="5"></textarea>

            <label>3. Which of the following is a valid CSS comment?</label>
            <select>
                <option>Choose One ...</option>
                <option>/* comment */</option>
                <option>// comment</option>
                <option># comment</option>
            </select>

            <label>4. What is the bottom margin given this declaration?</label>

            <div class="code-box">
                margin: 10px 5px 15px;
            </div>

            <input type="text">

            <button type="submit">Submit Quiz</button>

        </form>

    </div>

</body>

</html>
