<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="https://via.placeholder.com/120" alt="Logo">
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Trips</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <!-- Company Info -->
    <section class="company-info">
        <h1>White Water Rafting Company</h1>
        <p>123 Main River Street</p>
        <p>Kolob, California</p>
        <p>+1 999 999 9999</p>
        <p>info@whitewater.com</p>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">

        <div class="map">
            <img src="https://via.placeholder.com/500x400" alt="Map">
        </div>

        <form class="contact-form">

            <label>Name</label>
            <input type="text" placeholder="Placeholder">

            <label>Email</label>
            <input type="email" placeholder="Placeholder">

            <label>Message Purpose</label>

            <div class="radio-group">
                <label><input type="radio" name="purpose"> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>
            </div>

            <label>Message</label>
            <textarea placeholder="Type here"></textarea>

            <label class="checkbox">
                <input type="checkbox">
                Please Subscribe me to the monthly newsletter
            </label>

            <button type="submit">Get in Touch!</button>

        </form>

    </section>

    <!-- Employees -->
    <section class="employees">

        <h2>We Are Here to Serve You</h2>

        <div class="employee-cards">

            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Employee Profile</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Employee Profile</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Employee Profile</p>
            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>Footer Content including Social Media Icons/Links</p>

        <div class="social-icons">
            <span>□</span>
            <span>□</span>
            <span>□</span>
        </div>
    </footer>

</body>

</html>
